version: '3.8'
services:
  postgres:
    image: postgres:14-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=szene-app
    ports:
      - '51214:5432'
    volumes:
      - postgres:/var/lib/postgresql/data
volumes:
  postgres:
    name: szene-app-db
