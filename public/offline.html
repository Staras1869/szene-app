<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Szene — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .icon { font-size: 3rem; line-height: 1; }
    h1 { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.02em; }
    p { color: rgba(255,255,255,0.45); font-size: 0.875rem; max-width: 280px; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #7c3aed;
      color: #fff;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>No connection right now. Check your internet and try again — Szene will be here when you're back.</p>
  <a href="/" onclick="window.location.reload(); return false;">Try again</a>
</body>
</html>
