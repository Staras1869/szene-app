<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Subtle glow circle top-left -->
  <circle cx="300" cy="280" r="380" fill="url(#glow)"/>

  <!-- "S" lettermark — bold, white -->
  <text
    x="512" y="680"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="640"
    font-weight="800"
    text-anchor="middle"
    fill="white"
    letter-spacing="-20"
  >S</text>

  <!-- Small dot accent bottom-right -->
  <circle cx="720" cy="760" r="48" fill="#a78bfa" opacity="0.7"/>
</svg>
